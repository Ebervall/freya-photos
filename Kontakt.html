<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freya Photos | Kontakt</title>
    <!-- Google Fonts - Cinzel för rubriker, Lato för brödtext -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Sidhuvud med logotyp -->
    <header>
        <h1>Freya Photos</h1>
    </header>

    <!-- Navigering med hamburgermeny för mobil -->
    <nav>
        <input type="checkbox" id="meny-toggle">
        <label for="meny-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <div class="meny-länkar">
            <a href="Index.html">Hem</a>
            <a href="Omoss.html">Om oss</a>
            <a href="Tjanster.html">Tjänster</a>
            <a href="Portfolio.html">Portfolio</a>
            <a href="Kontakt.html">Kontakt</a>
        </div>
    </nav>

    <main>
        <!-- Rubriksektion för kontaktsidan -->
        <section class="kontakt-rubrik">
            <h2>Kontakt</h2>
        </section>

        <!-- Tvåkolumnslayout med kontaktinfo och formulär -->
        <section class="kontakt-innehall">
            <!-- Kontaktinformation till vänster -->
            <div class="kontakt-info">
                <h3>Kontakta oss</h3>
                <p>📍 Studiovägen 12, Stockholm</p>
                <p>📞 070-123 45 67</p>
                <p>✉️ info@freyaphotos.se</p>
            </div>

            <!-- Statiskt kontaktformulär till höger -->
            <div class="kontakt-formular">
                <label for="namn">Namn</label>
                <input type="text" id="namn" name="namn" placeholder="Ditt namn">

                <label for="epost">E-post</label>
                <input type="email" id="epost" name="epost" placeholder="Din e-post">

                <label for="meddelande">Meddelande</label>
                <textarea id="meddelande" name="meddelande" rows="5" placeholder="Ditt meddelande"></textarea>

                <button type="submit">Skicka</button>
            </div>
        </section>
    </main>

    <!-- Sidfot med copyright -->
    <footer>
        <p>Freya Photos &copy; 2024</p>
    </footer>

</body>

</html>
